name: daily-claim

on:
  schedule:
    # еҸ°зҒЈ 16:00 = UTC 08:00
    - cron: "0 8 * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      # 1пёҸвғЈ еҸ– repo
      - name: Checkout repo
        uses: actions/checkout@v4

      # 2пёҸвғЈ Node
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 3пёҸвғЈ е®үиЈқдҫқиіҙ
      - name: Install dependencies
        run: npm install

      # 4пёҸвғЈ Playwright
      - name: Install Playwright
        run: npx playwright install --with-deps

      # =========================
      # рҹҹў еёіиҷҹ 1
      # =========================
      - name: Restore auth A
        run: echo '${{ secrets.AUTH_STATE }}' > auth.json

      - name: Run claim A
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          ACCOUNT_NAME: "еёіиҷҹ1"
        run: node claim.js

      # =========================
      # рҹҹў еёіиҷҹ 2
      # =========================
      - name: Restore auth B
        run: echo '${{ secrets.AUTH_STATE_ALT }}' > auth.json

      - name: Run claim B
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          ACCOUNT_NAME: "еёіиҷҹ2"
        run: node claim.js
