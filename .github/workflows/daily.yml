name: daily-claim

on:
  schedule:
    # 台灣 16:00 = UTC 08:00
    - cron: "0 8 * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ 拉 code
      - name: Checkout repo
        uses: actions/checkout@v4

      # 2️⃣ 安裝 Node
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 3️⃣ 安裝依賴
      - name: Install dependencies
        run: npm install

      # 4️⃣ 安裝 Playwright 瀏覽器
      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      # 5️⃣ 還原登入狀態（重點）
      - name: Restore auth state
        run: echo '${{ secrets.AUTH_STATE }}' > auth.json

      # 6️⃣ 執行自動領取
      - name: Run claim script
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: node claim.js
