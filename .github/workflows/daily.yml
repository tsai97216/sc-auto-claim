name: daily-claim

on:
  schedule:
    - cron: "0 * * * *"   # 每小時
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      # =========================
      # 🟢 帳號 A
      # =========================
      - name: Restore auth A
        run: echo '${{ secrets.AUTH_STATE }}' > auth.json

      - name: Run claim A
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          ACCOUNT_NAME: "各位原住民同胞大家好"
          ACCOUNT_ID: A
        run: node claim.js

      # =========================
      # 🟢 帳號 B
      # =========================
      - name: Restore auth B
        run: echo '${{ secrets.AUTH_STATE_ALT }}' > auth.json

      - name: Run claim B
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          ACCOUNT_NAME: "食不食油餅"
          ACCOUNT_ID: B
        run: node claim.js

      # =========================
      # 🟢 Commit state（關鍵）
      # =========================
      - name: Commit state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add claim_state_*.json

          git diff --cached --quiet || git commit -m "update claim state"

          git push
