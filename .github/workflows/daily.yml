name: daily-claim

on:
  schedule:
    # 台灣 16:00 = UTC 08:00
    - cron: "0 8 * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ 取 repo
      - name: Checkout repo
        uses: actions/checkout@v4

      # 2️⃣ Node
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 3️⃣ 安裝依賴
      - name: Install dependencies
        run: npm install

      # 4️⃣ Playwright
      - name: Install Playwright
        run: npx playwright install --with-deps

      # =========================
      # 🟢 帳號 1
      # =========================
      - name: Restore auth A
        run: echo '${{ secrets.AUTH_STATE }}' > auth.json

      - name: Run claim A
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          ACCOUNT_NAME: "各位原住民同胞大家好"
        run: node claim.js

      # =========================
      # 🟢 帳號 2
      # =========================
      - name: Restore auth B
        run: echo '${{ secrets.AUTH_STATE_ALT }}' > auth.json

      - name: Run claim B
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          ACCOUNT_NAME: "食不食油餅"
        run: node claim.js
